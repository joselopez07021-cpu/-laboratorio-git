<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <main class="login-page container py-5">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-12 col-md-10 col-lg-5">
                <section class="login-card">
                    <div class="login-badge">Acceso</div>
                    <h1>Iniciar sesion</h1>
                    <p class="login-subtitle">
                        Entra con un ejemplo simple para practicar vistas, formularios y Bootstrap.
                    </p>

                    <div class="demo-box">
                        <span>Usuario: <strong>admin</strong></span>
                        <span>Clave: <strong>1234</strong></span>
                    </div>

                    <div th:if="${showError}" class="alert alert-danger mt-4 mb-0" role="alert">
                        Usuario o contraseña incorrectos.
                    </div>

                    <form class="mt-4" method="post" action="/login">
                        <div class="mb-3">
                            <label class="form-label" for="username">Usuario</label>
                            <input class="form-control custom-input" id="username" name="username" type="text"
                                placeholder="Escribe tu usuario" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label" for="password">Contraseña</label>
                            <input class="form-control custom-input" id="password" name="password" type="password"
                                placeholder="Escribe tu contraseña" required>
                        </div>

                        <div class="d-grid gap-2">
                            <button class="btn login-btn" type="submit">Entrar</button>
                            <a class="btn btn-outline-light back-btn" href="/">Volver al inicio</a>
                        </div>
                    </form>
                </section>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
